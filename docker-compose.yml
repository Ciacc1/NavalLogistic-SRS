version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - simulator-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - simulator-network

  fleet-simulator:
    build:
      context: ./simulators/fleet-simulator
      dockerfile: Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERS: kafka:29092
      LOG_LEVEL: info
    networks:
      - simulator-network
    restart: unless-stopped

  disaster-simulator:
    build:
      context: ./simulators/disaster-simulator
      dockerfile: Dockerfile
    depends_on:
      - kafka
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      LOG_LEVEL: info
    networks:
      - simulator-network
    restart: unless-stopped

  cargo-simulator:
    build:
      context: ./simulators/cargo-simulator
      dockerfile: Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERS: kafka:29092
      LOG_LEVEL: info
    networks:
      - simulator-network
    restart: unless-stopped

networks:
  simulator-network:
    driver: bridge
